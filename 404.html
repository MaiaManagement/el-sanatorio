<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada — El Sanatorio</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: #0a0a0a;
    }
    .error-page__code {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: rgba(245,245,240,0.3);
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
    }
    .error-page__title {
      font-family: 'Special Elite', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: #8b0000;
      margin-bottom: 1rem;
      line-height: 1.2;
    }
    .error-page__body {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      color: rgba(245,245,240,0.5);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .error-page__body em {
      color: rgba(245,245,240,0.25);
      font-style: italic;
    }
    .error-page__actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <main class="error-page" role="main">
    <p class="error-page__code">ERROR 404 — EXPEDIENTE NO ENCONTRADO</p>
    <h1 class="error-page__title">Esta habitación<br>no figura en los registros.</h1>
    <p class="error-page__body">
      La página que busca no existe, fue trasladada o nunca fue dada de alta.<br>
      <em>"Algunos pasillos no están en el mapa. Ella lo prefiere así."</em>
    </p>
    <div class="error-page__actions">
      <a href="/" class="btn btn--red">Volver al Inicio</a>
      <a href="/#reservar" class="btn btn--white">Reservar Mesa</a>
    </div>
  </main>
</body>
</html>
