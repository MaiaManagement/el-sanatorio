<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- El Sanatorio — Dark earth bg, warm copper arch motif -->
  <rect width="512" height="512" rx="102" ry="102" fill="#1C1008"/>
  <!-- Copper border -->
  <rect x="6" y="6" width="500" height="500" rx="98" ry="98" fill="none" stroke="#C87941" stroke-width="5" opacity="0.35"/>
  <!-- Elegant arch (hacienda/colonial architecture) -->
  <path d="M160 360 L160 240 Q160 150 256 150 Q352 150 352 240 L352 360" fill="none" stroke="#C87941" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner arch detail -->
  <path d="M192 360 L192 248 Q192 186 256 186 Q320 186 320 248 L320 360" fill="none" stroke="#C87941" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  <!-- Arch base -->
  <rect x="140" y="354" width="232" height="16" rx="4" fill="#C87941"/>
  <!-- Tropical leaf accent — simple stylized leaf -->
  <ellipse cx="256" cy="118" rx="22" ry="36" fill="#C87941" opacity="0.6" transform="rotate(-25 256 118)"/>
  <ellipse cx="280" cy="112" rx="16" ry="28" fill="#C87941" opacity="0.4" transform="rotate(15 280 112)"/>
</svg>
