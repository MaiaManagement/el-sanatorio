[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; img-src 'self' data: https://maps.google.com https://maps.gstatic.com https://www.google-analytics.com; frame-src https://maps.google.com; connect-src 'self' https://www.google-analytics.com; form-action 'self' https://formspree.io; base-uri 'self'; object-src 'none'; upgrade-insecure-requests"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/menu"
  to   = "/menu.html"
  status = 200

[[redirects]]
  from = "/experiencia"
  to   = "/experience.html"
  status = 200

[[redirects]]
  from = "/tours"
  to   = "/tours.html"
  status = 200

[[redirects]]
  from = "/contacto"
  to   = "/contact.html"
  status = 200
