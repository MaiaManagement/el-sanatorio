[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/menu"
  to   = "/menu.html"
  status = 200

[[redirects]]
  from = "/experiencia"
  to   = "/experience.html"
  status = 200

[[redirects]]
  from = "/tours"
  to   = "/tours.html"
  status = 200

[[redirects]]
  from = "/contacto"
  to   = "/contact.html"
  status = 200
